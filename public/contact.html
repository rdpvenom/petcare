<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us | PawCare Guide</title>
  <meta name="description" content="Contact PawCare Guide for support, feedback, and partnership inquiries." />
  <link rel="canonical" href="https://www.yourdomain.com/contact.html" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<header>
  <div class="container nav">
    <h1 class="logo">PawCare Guide</h1>
    <nav>
      <a href="index.html">Home</a>
      <a href="contact.html">Contact</a>
      <a href="about.html">About</a>
    </nav>
  </div>
</header>

<main class="container content">
  <h2>Contact Us</h2>
  <p>If you have questions, feedback, or business inquiries, send us a message below.</p>

  <form action="#" method="post" style="max-width:640px;">
    <label for="name">Full Name</label><br>
    <input type="text" id="name" name="name" required style="width:100%;padding:10px;margin:8px 0 16px;"><br>

    <label for="email">Email Address</label><br>
    <input type="email" id="email" name="email" required style="width:100%;padding:10px;margin:8px 0 16px;"><br>

    <label for="message">Message</label><br>
    <textarea id="message" name="message" rows="6" required style="width:100%;padding:10px;margin:8px 0 16px;"></textarea><br>

    <button type="submit" class="btn">Send Message</button>
  </form>
</main>

<footer>
  <div class="container footer-grid">
    <p>© 2026 PawCare Guide. All rights reserved.</p>
    <div>
      <a href="privacy-policy.html">Privacy Policy</a>
      <a href="terms.html">Terms</a>
    </div>
  </div>
</footer>
</body>
</html>
